<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂喊人传话系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { text-align: center; max-width: 600px; width: 100%; }
        h1 { color: #fff; font-size: 2rem; margin-bottom: 0.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .subtitle { color: rgba(255,255,255,0.85); font-size: 1rem; margin-bottom: 2.5rem; }
        .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card {
            flex: 1; min-width: 220px; max-width: 280px;
            background: #fff; border-radius: 16px; padding: 40px 30px;
            text-decoration: none; color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .card .icon { font-size: 3rem; margin-bottom: 16px; }
        .card .title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
        .card .desc { font-size: 0.9rem; color: #888; }
        .teacher-card { border-top: 4px solid #4F46E5; }
        .display-card { border-top: 4px solid #10B981; }
        .footer { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📢 课堂喊人传话系统</h1>
        <p class="subtitle">老师不用吼，学生不用跑</p>
        <div class="cards">
            <a href="/teacher" class="card teacher-card">
                <div class="icon">👨‍🏫</div>
                <div class="title">老师控制台</div>
                <div class="desc">喊人、传话、广播</div>
            </a>
            <a href="/display" class="card display-card">
                <div class="icon">🖥️</div>
                <div class="title">教室显示屏</div>
                <div class="desc">大屏显示 + 语音播报</div>
            </a>
        </div>
        <p class="footer">请确保所有设备连接同一局域网 · v3.0 多教室版</p>
    </div>
</body>
</html>
